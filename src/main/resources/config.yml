# Fraction of wall segments that have a doorway opening (0.0–1.0).
# Lower values create a denser, more maze-like layout.
# Whether players keep their inventory on death inside the backrooms.
# Recommended true — dying respawns you at a random location, making
# dropped items effectively unrecoverable.
keep-inventory: true

wall-open-chance: 0.70

escape-door:
  # Set to false to disable the escape door entirely.
  enabled: true
  # One escape door appears on average every <rarity> rooms.
  # Higher = rarer. Default 500 means roughly one door per very large area of exploration.
  rarity: 500

furniture:
  # Set to false to disable all furniture (plant stands, sofas, desks, cabinets).
  enabled: true
  # Fraction of rooms that contain a piece of furniture (0.0–1.0).
  chance: 0.08

ambient-sounds:
  # Set to false to disable the ambient hum and cave sounds.
  enabled: true

paranoid-messages:
  # Set to false to disable the occasional unsettling chat messages.
  enabled: true
  # Probability per player per ~15 seconds of receiving a message (0.0–1.0).
  # Default 0.04 averages roughly one message every 6 minutes.
  chance: 0.04

levels:
  # When true, the world is divided into 480-block zones, each assigned one of
  # four level aesthetics. Zones cluster naturally from the hash — adjacent
  # zones often share the same level, creating distinct regions.
  #
  #   Hallways  (40%) — classic yellow bamboo walls, horn coral floor
  #   Warehouse (25%) — stone brick walls, smooth stone floor, lit lamps
  #   Poolrooms (20%) — white concrete, prismarine floor, ankle-deep water
  #   Office    (15%) — dark oak walls/floor, shroomlight ceiling panels
  #
  # Disable to make the entire world Level 0 (Hallways) only.
  enabled: true

noclip-trigger:
  # When true, suffocation (being crushed into a solid block) can send the
  # player to the backrooms instead of taking damage.
  enabled: true
  # Probability per suffocation hit (0.0–1.0). Default 0.15 = 15% per hit.
  chance: 0.15

long-fall-trigger:
  # When true, a qualifying fall can send the player to the backrooms instead
  # of taking fall damage.
  enabled: true
  # Raw fall damage threshold (before armor). Default 8 ≈ falling from 11 blocks.
  min-damage: 8.0
  # Probability per qualifying fall (0.0–1.0). Default 0.25 = 25% chance.
  chance: 0.25

portal-trigger:
  # When true, each portal use has a random chance of sending the player
  # to the backrooms instead of the nether/end. Off by default.
  enabled: false
  # Probability per portal use (0.0–1.0). Default 0.02 = 2% chance.
  chance: 0.02
